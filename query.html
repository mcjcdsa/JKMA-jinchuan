    <section class="section">
        <div class="container">
            <h2 class="section-title">金川市服务查询</h2>
            
            <div class="query-tabs">
                <button class="tab-btn active" data-tab="coordinate">坐标查询</button>
                <button class="tab-btn" data-tab="building">建筑查询</button>
                <button class="tab-btn" data-tab="teleport">传送点查询</button>
            </div>

            <div id="coordinate-tab" class="tab-content active">
                <div class="query-form">
                    <h3>坐标查询</h3>
                    <p class="query-hint">输入坐标查询对应位置信息（格式：X Y Z 或 X,Z）</p>
                    <div class="input-group">
                        <input type="text" id="coordinate-input" placeholder="例如：100 64 200 或 100,200" class="query-input">
                        <button id="coordinate-query-btn" class="query-btn">查询</button>
                    </div>
                    <div id="coordinate-result" class="query-result"></div>
                </div>
            </div>

            <div id="building-tab" class="tab-content">
                <div class="query-form">
                    <h3>建筑查询</h3>
                    <p class="query-hint">搜索主要建筑和地标</p>
                    <div class="input-group">
                        <input type="text" id="building-input" placeholder="输入建筑名称" class="query-input">
                        <button id="building-query-btn" class="query-btn">查询</button>
                    </div>
                    <div id="building-result" class="query-result"></div>
                    <div id="building-list" class="building-list"></div>
                </div>
            </div>

            <div id="teleport-tab" class="tab-content">
                <div class="query-form">
                    <h3>传送点查询</h3>
                    <p class="query-hint">查询主要传送点位置</p>
                    <div id="teleport-result" class="teleport-list"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { init } from './js/main.js';
        import { initQueryPage, switchTab, queryCoordinate, queryBuilding, searchBuildings, selectBuilding } from './js/query.js';
        
        // 初始化通用功能
        init();
        
        // 初始化查询页面
        document.addEventListener('DOMContentLoaded', function() {
            initQueryPage();
            
            // 绑定标签页切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.getAttribute('data-tab');
                    switchTab(tabName, this);
                });
            });
            
            // 绑定查询按钮
            document.getElementById('coordinate-query-btn').addEventListener('click', queryCoordinate);
            document.getElementById('building-query-btn').addEventListener('click', queryBuilding);
            
            // 绑定建筑搜索
            const buildingInput = document.getElementById('building-input');
            if (buildingInput) {
                buildingInput.addEventListener('input', function(e) {
                    searchBuildings(e.target.value);
                });
            }
        });
    </script>
    <button class="back-to-top" id="backToTop">↑</button>
</body>
