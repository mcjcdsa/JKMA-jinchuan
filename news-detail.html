<body>
    <nav class="navbar">
        <div class="nav-header">
            <h2 class="nav-title">JKMA都市圈|金川市</h2>
        </div>
        <div class="nav-container">
            <a href="index.html" class="nav-link">主页</a>

        </div>

    <section class="section">
        <div class="container">
            <div id="news-detail" class="news-detail">
                <a href="news.html" class="back-link">← 返回新闻列表</a>
                <div id="news-content"></div>
            </div>
        </div>
    </section>

    <button class="back-to-top" id="backToTop">↑</button>

    <script type="module">
        import { init } from './js/main.js';
        import { addNewsStructuredData } from './js/seo.js';
        
        // 初始化通用功能
        init();
        
        function loadNewsDetail() {
            const newsStr = localStorage.getItem('currentNews');
            if (!newsStr) {
                window.location.href = 'news.html';
                return;
            }

            const news = JSON.parse(newsStr);
            const content = document.getElementById('news-content');
            
            // 更新页面标题和描述
            document.title = news.title + ' - JKMA都市圈|金川市官方网站';
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute('content', news.summary || news.content);
            }
            
            content.innerHTML = `
                <div class="news-detail-header">
                    <div class="news-category ${news.category}">${getCategoryName(news.category)}</div>
                    <h1 class="news-detail-title">${news.title}</h1>
                    <div class="news-detail-meta">
                        <span class="news-date">发布时间：${news.date}</span>
                    </div>
                </div>
                <div class="news-detail-body">
                    <p>${news.content}</p>
                </div>
            `;
            
            // 添加结构化数据
            addNewsStructuredData(news);
        }

        function getCategoryName(category) {
            const names = {
                'announcement': '公告',
                'activity': '活动',
                'update': '更新'
            };
            return names[category] || '其他';
        }

        loadNewsDetail();
    </script>
</body>
