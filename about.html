    <script type="module">
        import { init } from './js/main.js';
        import { initTimeline } from './js/timeline.js';
        import { initOrganizations } from './js/organizations.js';
        
        // 初始化通用功能
        init();
        
        // 初始化时间轴和集团划分
        function initPage() {
            const timeline = document.getElementById('timeline');
            if (!timeline) {
                console.error('时间轴元素未找到');
                return;
            }
            
            try {
                initTimeline();
                console.log('时间轴初始化成功');
            } catch (error) {
                console.error('时间轴初始化失败:', error);
                timeline.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #dc2626;">
                        <h3 style="margin-bottom: 15px;">⚠️ 时间轴加载失败</h3>
                        <p style="margin-bottom: 10px;">请使用HTTP服务器访问此页面</p>
                        <p style="font-size: 0.9em; color: #666;">
                            双击运行 <strong>start-server.py</strong> 或 <strong>start-server.bat</strong><br>
                            然后访问 <strong>http://localhost:8000/about.html</strong>
                        </p>
                    </div>
                `;
            }
            
            // 初始化集团划分
            try {
                initOrganizations();
                console.log('集团划分初始化成功');
            } catch (error) {
                console.error('集团划分初始化失败:', error);
            }
        }
        
        // DOM加载完成后执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPage);
        } else {
            // DOM已经加载完成，延迟一点确保所有元素都已准备好
            setTimeout(initPage, 100);
        }
    </script>
